apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
  annotations:
    # CRDs first — Cilium can't register the cilium GatewayClass until these exist
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/kubernetes-sigs/gateway-api
    # Experimental channel — Cilium expects TLSRoute / TCPRoute / UDPRoute /
    # BackendTLSPolicy CRDs to exist even if unused. Standard channel omits
    # them, causing the Cilium gateway controller to crash with
    # "no kind is registered for the type v1alpha2.TLSRouteList".
    path: config/crd/experimental
    targetRevision: v1.2.1
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - ServerSideDiff=true
