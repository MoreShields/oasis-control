apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-gateway
  namespace: argocd
  annotations:
    # After CRDs (0), HelmChartConfig (1), so the cilium GatewayClass exists
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/MoreShields/oasis-control
    path: control/system/gateway
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
